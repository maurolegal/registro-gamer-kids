
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Gamer Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Bungee', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .hero {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo-gamer {
      width: 100px;
      max-width: 30vw;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    h1 {
      font-size: 6vw;
      color: #00ffe1;
      text-shadow: 0 0 8px #00ffe1;
      margin-top: 10px;
    }
    .form-container {
      background: rgba(0, 0, 0, 0.75);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px #00ffe1;
      width: 100%;
      max-width: 500px;
    }
    label {
      display: block;
      margin-top: 15px;
      font-size: 14px;
      color: #00ffe1;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 2px solid #00ffe1;
      border-radius: 10px;
      background: #1a1a2e;
      color: white;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      box-shadow: 0 0 8px #00ffe1;
    }
    .checkbox {
      display: flex;
      align-items: center;
      margin-top: 15px;
    }
    .checkbox input {
      margin-right: 10px;
      transform: scale(1.3);
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #00ffe1;
      color: black;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #00c8b2;
    }
    .mensaje-exito {
      display: none;
      margin-top: 20px;
      background: #0f0c29;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #00ffe1;
      color: #00ffe1;
      text-align: center;
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 7vw;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img class="logo-gamer" src="https://i.ibb.co/zVWk7dMy/LOGO-PUNTOS-NEMESIS.png" alt="LOGO PUNTOS NEMESIS">
    <h1>¡Únete a la aventura Gamer!</h1>
  </div>

  <div class="form-container">
    <form id="gamerForm" action="https://formspree.io/f/mabc1234" method="POST">
      <label for="nombre">Nombre y Apellido del niño:</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="edad">Edad:</label>
      <input type="number" id="edad" name="edad" min="3" max="16" required>

      <label for="talla">Talla de camiseta:</label>
      <select id="talla" name="talla" required>
        <option value="">-- Selecciona --</option>
        <option value="4">4</option>
        <option value="6">6</option>
        <option value="8">8</option>
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="14">14</option>
        <option value="S">S</option>
        <option value="M">M</option>
      </select>

      <label for="acudiente">Nombre del acudiente:</label>
      <input type="text" id="acudiente" name="acudiente" required>

      <label for="horario">Horario preferido:</label>
      <select id="horario" name="horario" required>
        <option value="">-- Selecciona --</option>
        <option value="8-12">8:00 a.m. - 12:00 p.m.</option>
        <option value="2-6">2:00 p.m. - 6:00 p.m.</option>
      </select>

      <div class="checkbox">
        <input type="checkbox" id="asistire" name="asistire" required>
        <label for="asistire">¡Sí, asistiré!</label>
      </div>

      <button type="submit">¡Enviar ahora!</button>
    </form>

    <div class="mensaje-exito" id="mensajeExito">
      🎉 ¡Gracias por registrarte, mini gamer! Nos vemos en el evento 👾
    </div>
  </div>

  <script>
    const form = document.getElementById('gamerForm');
    const mensajeExito = document.getElementById('mensajeExito');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      const formData = new FormData(form);
      const response = await fetch(form.action, {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        form.reset();
        mensajeExito.style.display = 'block';
      } else {
        alert("Hubo un error. Intenta de nuevo.");
      }
    });
  </script>
</body>
</html>
