<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro Gamer Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Bungee', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .hero {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeIn 1.5s ease-in-out;
    }

    .hero img {
      width: 120px;
      animation: bounce 2s infinite;
    }

    .hero h1 {
      font-size: 2em;
      margin: 10px 0;
      color: #00ffe1;
      text-shadow: 0 0 8px #00ffe1;
    }

    .form-container {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 15px #00ffe1;
      width: 90%;
      max-width: 500px;
      animation: slideUp 1s ease-out;
    }

    form label {
      display: block;
      margin: 15px 0 5px;
      color: #00ffe1;
      font-size: 14px;
    }

    form input, form select {
      width: 100%;
      padding: 12px;
      border: 2px solid #00ffe1;
      border-radius: 10px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    form input:focus, form select:focus {
      outline: none;
      box-shadow: 0 0 10px #00ffe1;
      background: #0f0f1a;
    }

    .checkbox {
      display: flex;
      align-items: center;
      margin-top: 15px;
    }

    .checkbox input {
      margin-right: 10px;
      transform: scale(1.4);
    }

    .checkbox label {
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      background: #00ffe1;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 10px #00ffe1;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #00d8b2;
    }

    .mensaje-exito {
      display: none;
      margin-top: 20px;
      background: #0f0c29;
      padding: 15px;
      border-radius: 12px;
      border: 2px solid #00ffe1;
      color: #00ffe1;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="Gamer Icon">
    <h1>¡Únete a la aventura Gamer!</h1>
  </div>

  <div class="form-container" id="formulario">
    <form id="gamerForm" action="https://formspree.io/f/mabc1234" method="POST">
      <label for="nombre">Nombre y Apellido del niño:</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="edad">Edad:</label>
      <input type="number" id="edad" name="edad" min="3" max="16" required>

      <label for="talla">Talla de camiseta:</label>
      <select id="talla" name="talla" required>
        <option value="">-- Selecciona --</option>
        <option value="4">4</option>
        <option value="6">6</option>
        <option value="8">8</option>
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="14">14</option>
        <option value="S">S</option>
        <option value="M">M</option>
      </select>

      <label for="acudiente">Nombre del acudiente:</label>
      <input type="text" id="acudiente" name="acudiente" required>

      <label for="horario">Horario preferido:</label>
      <select id="horario" name="horario" required>
        <option value="">-- Selecciona --</option>
        <option value="8-12">8:00 a.m. - 12:00 p.m.</option>
        <option value="2-6">2:00 p.m. - 6:00 p.m.</option>
      </select>

      <div class="checkbox">
        <input type="checkbox" id="asistire" name="asistire" required>
        <label for="asistire">¡Sí, asistiré!</label>
      </div>

      <button type="submit">¡Enviar ahora!</button>
    </form>

    <div class="mensaje-exito" id="mensajeExito">
      🎉 ¡Gracias por registrarte, mini gamer! Nos vemos en el evento 👾
    </div>
  </div>

  <script>
    const form = document.getElementById('gamerForm');
    const mensajeExito = document.getElementById('mensajeExito');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      
      const formData = new FormData(form);
      const response = await fetch(form.action, {
        method: "POST",
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        form.reset();
        mensajeExito.style.display = 'block';
      } else {
        alert("Hubo un error. Intenta de nuevo.");
      }
    });
  </script>

</body>
</html>
